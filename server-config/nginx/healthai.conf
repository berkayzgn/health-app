# /etc/nginx/sites-available/healthai
#
# Kopyalama: scp server-config/nginx/healthai.conf user@SUNUCU_IP:/etc/nginx/sites-available/healthai
# Aktivasyon: sudo ln -s /etc/nginx/sites-available/healthai /etc/nginx/sites-enabled/
# Test:       sudo nginx -t && sudo systemctl reload nginx
#
# api.yourdomain.com → kendi domain'inle değiştirin

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL sertifikaları — certbot tarafından doldurulur:
    # sudo certbot --nginx -d api.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Güvenlik başlıkları (K1, K6)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                           always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header Referrer-Policy            "no-referrer"                                  always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;

    # Fotoğraf / görsel upload limiti (AI meal analyze için)
    client_max_body_size 15M;

    # Backend API (K3 — sadece localhost'a bind edilmiş NestJS)
    location /api/ {
        limit_req zone=api_limit burst=15 nodelay;

        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # pgAdmin — asla public (K8)
    location /pgadmin {
        deny all;
        return 403;
    }

    # Bilinmeyen path'lere 404
    location / {
        return 404;
    }
}

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}
