networks:
  healthai:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: health-ai-postgres
    restart: unless-stopped
    networks:
      - healthai
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-healthai}
    # Lokal geliştirme: host’tan Prisma / pgAdmin için 5433. Production compose’ta kapalı.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthai} -d ${POSTGRES_DB:-healthai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: health-ai-backend
    restart: unless-stopped
    networks:
      - healthai
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthai}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-healthai}?schema=public
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512m

  # ── pgAdmin: yalnızca lokal geliştirme — production’da kullanma / dışarı açma ──
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: health-ai-pgadmin
    restart: unless-stopped
    networks:
      - healthai
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@healthai.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    shm_size: "256mb"
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  postgres_data:
  pgadmin_data:
