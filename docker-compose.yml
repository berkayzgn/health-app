networks:
  healthai:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: health-ai-postgres
    restart: unless-stopped
    networks:
      - healthai
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-healthai}
    # Production: do NOT expose 5432 externally. Remove the ports block below if not needed for local debugging.
    # ports:
    #   - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthai} -d ${POSTGRES_DB:-healthai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health-ai-backend
    restart: unless-stopped
    networks:
      - healthai
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthai}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-healthai}?schema=public
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512m

  # ── pgAdmin: LOCAL DEV ONLY — DO NOT run in production ───────────────────────
  # Uncomment only locally. Never expose port 5050 on a public droplet.
  # pgadmin:
  #   image: dpage/pgadmin4:8.14
  #   container_name: health-ai-pgadmin
  #   restart: unless-stopped
  #   networks:
  #     - healthai
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   ports:
  #     - "5050:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@example.com
  #     PGADMIN_DEFAULT_PASSWORD: admin123
  #     PGADMIN_CONFIG_SERVER_MODE: "False"
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   shm_size: "256mb"

volumes:
  postgres_data:
  pgadmin_data:
